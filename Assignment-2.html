<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Async Weather Tracker</title>

<link rel="stylesheet" href="Ass-2.css">

</head>
<body>

<h2 class="title">🌤 Async Weather Tracker</h2>

<div class="top-section">

<div class="card">

<h4>Search City</h4>

<form id="weatherForm">

<input type="text" id="cityInput" placeholder="Delhi, London">

<button type="submit">Search</button>

</form>

<h4>Search History</h4>

<div class="history"></div>

</div>

<div class="card">

<h4>Weather Info</h4>

<div class="info"></div>

</div>

</div>

<div class="console-card">

<h4>Console – Event Loop</h4>

<div class="console"></div>

</div>

<script src="Ass-2.js"></script>

</body>
</html>
